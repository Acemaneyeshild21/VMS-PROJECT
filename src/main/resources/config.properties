# Configuration SMTP
# Pour activer l'envoi d'emails, renseignez smtp.pass avec un App Password Gmail :
#   1. Compte Google > Securite > Validation en deux etapes (activer)
#   2. Rechercher "Mots de passe d'application" > Creer pour "Messagerie/Autre (VMS)"
#   3. Coller le code de 16 caracteres ci-dessous
# Si smtp.pass est vide, EmailService bascule en mode console (logs uniquement).
smtp.host=smtp.gmail.com
smtp.port=587
smtp.user=vms.intermart@gmail.com
smtp.pass=
smtp.from.name=Intermart VMS
smtp.admin.email=admin@intermart.mu

